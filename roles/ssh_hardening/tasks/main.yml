---
- name: Load OS-specific variables
  ansible.builtin.include_vars:
    file: "{{ item }}"
    name: os_vars
  with_first_found:
    - files:
        - "{{ ansible_distribution }}.yml"
        - "{{ ansible_os_family }}.yml"
      skip: true

- name: Set variables from OS-spcific values (if not already defined)
  ansible.builtin.set_fact:
    "{{ item.key }}": "{{ item.value }}"
  with_dict: "{{ os_vars }}"
  when: not lookup('varnames' '^' + item.key + '$')

- name: Install OpenSSH packages and ensure config file permissions
  ansible.builtin.include_tasks:
    file: install.yml

- name: Get raw OpenSSH version
  ansible.builtin.command:
    cmd: ssh -V
  register: sshd_version_raw
  changed_when: false
  check_mode: false

- name: Parse raw OpenSSH version
  ansible.builtin.set_fact:
    sshd_version: "{{ sshd_version_raw.stderr | regex_replace('OpenSSH_([0-9]+\.[0-9]+).*', '\\1') }}"
